name: holdstrong
description: A discipline tracking app — make every craving you resist count.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.2
  lottie: ^3.3.3
  intl: ^0.20.2
  uuid: ^4.5.3
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  isar_generator: ^3.1.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon_fg.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F0F13"
  adaptive_icon_foreground: "assets/icon_fg.png"

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Regular.ttf
          weight: 400
        - asset: assets/fonts/Rajdhani-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
